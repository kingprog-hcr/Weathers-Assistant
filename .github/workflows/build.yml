name: Build WeatherProgramm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller project.spec --clean

      - name: Rename executable (Linux/Mac)
        if: runner.os != 'Windows'
        run: mv dist/WeatherProgramm dist/WeatherProgramm-${{ runner.os }}

      - name: Create Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH","Machine") + ";" + $env:PATH
          if (-not (Test-Path ".env.example")) {
            New-Item -Path ".env.example" -Value "API_KEY=`nGROQ_API_KEY=" | Out-Null
          }
          Write-Host "Contenu de dist/:"
          Get-ChildItem dist\
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Rename executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: mv dist\WeatherProgramm.exe dist\WeatherProgramm-Windows.exe

      - name: Upload artifact (Linux/Mac)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: WeatherProgramm-${{ runner.os }}
          path: dist/WeatherProgramm-${{ runner.os }}

      - name: Upload artifact (Windows exe)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: WeatherProgramm-Windows
          path: dist/WeatherProgramm-Windows.exe

      - name: Upload artifact (Windows installer)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: WeatherProgramm-Setup-Windows
          path: Output/WeatherProgramm-Setup.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WeatherProgramm-Linux/WeatherProgramm-Linux
            WeatherProgramm-Windows/WeatherProgramm-Windows.exe
            WeatherProgramm-Setup-Windows/WeatherProgramm-Setup.exe
            WeatherProgramm-macOS/WeatherProgramm-macOS
          body: |
            ## WeatherProgramm ${{ github.ref_name }}

            | Système | Fichier | Description |
            |---|---|---|
            | Windows | WeatherProgramm-Setup.exe | **Installeur recommandé** |
            | Windows | WeatherProgramm-Windows.exe | Exécutable portable |
            | Linux | WeatherProgramm-Linux | Exécutable Linux |
            | macOS | WeatherProgramm-macOS | Exécutable macOS |

            Créez un fichier `.env` à côté de l'exécutable :

            ```
            API_KEY=votre_cle_openweathermap
            GROQ_API_KEY=votre_cle_groq
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
