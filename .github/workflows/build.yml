name: Build WeatherProgramm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller project.spec --clean

      - name: Rename executable (Linux/Mac)
        if: runner.os != 'Windows'
        run: mv dist/WeatherProgramm dist/WeatherProgramm-${{ runner.os }}

      - name: Rename executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: mv dist/WeatherProgramm.exe dist/WeatherProgramm-Windows.exe

      # Installeur Windows avec Inno Setup
      - name: Create Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          iscc installer.iss

      - name: Upload artifact (Linux/Mac)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: WeatherProgramm-${{ runner.os }}
          path: dist/WeatherProgramm-${{ runner.os }}

      - name: Upload artifact (Windows exe)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: WeatherProgramm-Windows
          path: dist/WeatherProgramm-Windows.exe

      - name: Upload artifact (Windows installer)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: WeatherProgramm-Setup-Windows
          path: Output/WeatherProgramm-Setup.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WeatherProgramm-Linux/WeatherProgramm-Linux
            WeatherProgramm-Windows/WeatherProgramm-Windows.exe
            WeatherProgramm-Setup-Windows/WeatherProgramm-Setup.exe
            WeatherProgramm-macOS/WeatherProgramm-macOS
          body: |
            ## WeatherProgramm ${{ github.ref_name }}

            ### Téléchargement

            | Système | Fichier | Description |
            |---|---|---|
            | Windows | WeatherProgramm-Setup.exe | **Installeur recommandé**  crée un raccourci bureau |
            | Windows | WeatherProgramm-Windows.exe | Exécutable portable |
            | Linux | WeatherProgramm-Linux | Exécutable Linux |
            | macOS | WeatherProgramm-macOS | Exécutable macOS |

            ### Configuration requise

            Créez un fichier `.env` dans le même dossier que l'exécutable :

            API_KEY=votre_cle_openweathermap
            GROQ_API_KEY=votre_cle_groq

            Clé OpenWeatherMap gratuite : https://openweathermap.org/api
            Clé Groq gratuite (optionnel) : https://console.groq.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}